<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="color-scheme" content="dark"/>
<meta name="theme-color" content="#0E0E10"/>
<title>Glyph Studio — Tessera</title>
<meta name="description" content="Glyph Studio — design holographic Tessera cards that verify a venue's real-world presence."/>
<meta property="og:type" content="website"/>
<meta property="og:title" content="Glyph Studio"/>
<meta property="og:description" content="Design holographic Tessera cards that verify a venue's real-world presence."/>
<meta name="apple-mobile-web-app-title" content="Glyph Studio"/>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<!-- self-hosted fonts — no CDN, works with no network -->
<link rel="stylesheet" href="fonts/fonts.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <span class="brand-name">Glyph Studio</span>
      <span class="brand-count" id="venueCount">0 venues</span>
    </div>
    <div class="topbar-right">
      <nav class="tabs">
        <button class="tab active" data-view="editor">Editor</button>
        <button class="tab" data-view="gallery">Gallery</button>
      </nav>
      <div class="overflow">
        <button class="overflow-btn" id="menuBtn" aria-label="More" aria-haspopup="true">⋯</button>
        <div class="menu" id="menu" hidden>
          <button class="menu-item" id="resetSamplesBtn">Reset to samples</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ===================== EDITOR ===================== -->
  <section id="editorView" class="view">
    <div class="grid">
      <div class="controls">
        <div class="field">
          <label>Venue logo (transparent PNG ideal)</label>
          <label class="logo-drop">
            <input type="file" id="logoInput" accept="image/*"/>
            <div class="lt">Tap to upload the venue's logo</div>
            <div class="ls">or leave empty for an elegant wordmark</div>
          </label>
          <div class="logo-status" id="logoStatus">
            <span id="logoName"></span>
            <button onclick="clearLogo()">Remove</button>
          </div>
        </div>
        <div class="field">
          <label>Venue name</label>
          <input id="venue"/>
        </div>
        <div class="field">
          <label>Event</label>
          <input id="event"/>
        </div>
        <div class="row2">
          <div class="field"><label>Location</label><input id="loc"/></div>
          <div class="field"><label>Date</label><input id="date"/></div>
        </div>
        <div class="row2">
          <div class="field"><label>Edition</label><input id="edition"/></div>
          <div class="field"><label>Tagline</label><input id="tag"/></div>
        </div>
        <div class="field">
          <label>Frame palette</label>
          <div class="chips" id="themes"></div>
        </div>
        <div class="field">
          <label>Rarity</label>
          <div class="rarity-chips" id="rarities"></div>
        </div>
        <div class="field">
          <label>Designs</label>
          <div class="lib-actions">
            <button class="sbtn primary" onclick="saveCurrent()">Save</button>
            <button class="sbtn" onclick="newDesign()">New</button>
            <button class="sbtn" onclick="exportCurrent()">Export</button>
          </div>
        </div>
      </div>

      <div class="stage">
        <div class="stage-hint">Drag to rotate · move across to shift the light</div>
        <div class="scene" id="scene"></div>
        <div class="stage-controls">
          <button class="sbtn primary" onclick="flip()">Flip card</button>
          <button class="sbtn" onclick="resetView()">Reset</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ===================== GALLERY ===================== -->
  <section id="galleryView" class="view" hidden>
    <div class="gallery-toolbar">
      <span class="gtb-hint">Back up your collection or move it between devices.</span>
      <div class="gtb-actions">
        <button class="sbtn" id="importBtn">Import</button>
        <button class="sbtn" id="exportAllBtn">Export collection</button>
      </div>
    </div>
    <input type="file" id="importInput" accept="application/json,.json" hidden/>
    <div class="gallery-empty" id="galleryEmpty" hidden>
      <div class="empty-mark">✦</div>
      <div class="empty-title">No venues yet</div>
      <div class="empty-sub">Design a Tessera in the editor and hit Save — or bring back the demo set.</div>
      <div class="empty-actions">
        <button class="sbtn primary" id="emptyCreateBtn">Create a venue</button>
        <button class="sbtn" onclick="resetToSamples()">Reset to samples</button>
      </div>
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </section>
</div>

<!-- ===================== FOCUS (single-card 3D) ===================== -->
<div class="focus-overlay" id="focusOverlay" hidden>
  <button class="focus-close" id="focusClose" aria-label="Close">✕</button>
  <div class="focus-scene" id="focusScene"></div>
  <div class="focus-meta">
    <div class="focus-name" id="focusName"></div>
    <div class="focus-actions">
      <button class="sbtn" id="focusFlip">Flip</button>
      <button class="sbtn primary" id="focusOpen">Open in editor</button>
    </div>
    <div class="focus-hint">Drag to rotate · move across to shift the light</div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
